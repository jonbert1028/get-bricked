<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GET BRICKED Price Scanner</title>

<style>
:root { --bg:#0f1115; --card:#171a21; --text:#e8eaf0; --accent:#ffd500; --border:#262b36; }
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,sans-serif; background:var(--bg); color:var(--text); padding:24px; }
.container { max-width:1200px; margin:0 auto; }
.logo { display:flex; align-items:center; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
.lego-title { font-weight:900; font-size:32px; }
.lego-title span { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 1px 1px 0 #000; }
.tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.tab { padding:12px 20px; background:#171a21; border:1px solid var(--border); border-radius:10px; cursor:pointer; font-weight:600; }
.tab-active { background:#ffd500; color:#000; border-color:#ffd500; }
.search { display:flex; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
input,select,button { padding:14px 18px; border:1px solid var(--border); background:var(--card); color:var(--text); border-radius:10px; font-size:16px; }
input { flex:1; min-width:200px; }
button { background:var(--accent); color:#000; font-weight:700; cursor:pointer; border:none; }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:24px; }
#video,#preview { width:100%; max-width:500px; border-radius:8px; margin-top:12px; display:none; }
table { width:100%; border-collapse:collapse; }
th,td { padding:14px; text-align:left; border-bottom:1px solid var(--border); }
.price { font-weight:700; color:#3fb950; }
</style>
</head>
